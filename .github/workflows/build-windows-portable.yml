name: Build LichtFeld Studio v0.5.3 portable

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-windows-portable.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUILD_DIR: b
  CUDA_ROOT: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.8"

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout official LichtFeld Studio v0.5.3 source
        uses: actions/checkout@v4
        with:
          repository: MrNeRF/LichtFeld-Studio
          ref: d8c50c6a3e2273cb74130a6e9023de8d068af52d
          fetch-depth: 1
          submodules: recursive

      - name: Verify source revision
        shell: pwsh
        run: |
          $expected = "d8c50c6a3e2273cb74130a6e9023de8d068af52d"
          $actual = (git rev-parse HEAD).Trim()
          if ($actual -ne $expected) {
            throw "Unexpected source revision: $actual"
          }

      - name: Install CUDA Toolkit 12.8
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://developer.download.nvidia.com/compute/cuda/12.8.0/local_installers/cuda_12.8.0_571.96_windows.exe"
          $installer = "$env:RUNNER_TEMP\\cuda-12.8.exe"
          & curl.exe --fail --location --retry 5 --retry-all-errors --output $installer $url
          if ($LASTEXITCODE -ne 0) {
            throw "CUDA installer download failed with exit code $LASTEXITCODE."
          }
          $process = Start-Process -FilePath $installer -ArgumentList @("-y", "-s", "-accepteula", "-toolkit", "-override", "-noDisplayDriver") -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "CUDA installer failed with exit code $($process.ExitCode)."
          }

      - name: Configure and verify CUDA environment
        shell: pwsh
        run: |
          $cuda = $env:CUDA_ROOT
          $required = @(
            "$cuda\\bin\\nvcc.exe",
            "$cuda\\include\\cusparse.h",
            "$cuda\\lib\\x64\\cusparse.lib"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Incomplete CUDA installation; missing $path"
            }
          }
          "CUDA_PATH=$cuda" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "CUDA_PATH_V12_8=$cuda" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "CUDAToolkit_ROOT=$cuda" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "$cuda\\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          & "$cuda\\bin\\nvcc.exe" --version

      - name: Restore compiled dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/vcpkg_installed
          key: lfs-v053-windows-cuda128-portable-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            lfs-v053-windows-cuda128-portable-

      - name: Configure release build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B %BUILD_DIR% -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_PORTABLE=ON -DBUILD_PYTHON_STUBS=OFF -DCUDA_DEVICE_DEBUG=OFF

      - name: Verify portable CUDA configuration
        shell: pwsh
        run: |
          $cache = Get-Content -LiteralPath "$env:BUILD_DIR\\CMakeCache.txt"
          $expected = @(
            "BUILD_PORTABLE:BOOL=ON",
            "BUILD_CUDA_PTX_ONLY:BOOL=ON",
            "BUILD_CUDA_MIN_SM:STRING=75",
            "CMAKE_CUDA_ARCHITECTURES:STRING=75-virtual"
          )
          foreach ($entry in $expected) {
            if ($cache -notcontains $entry) {
              throw "Unexpected build configuration; missing '$entry'."
            }
          }
          $expected | ForEach-Object { Write-Host $_ }

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build %BUILD_DIR% -j %NUMBER_OF_PROCESSORS%

      - name: Print failure diagnostics
        if: failure()
        shell: pwsh
        run: |
          $paths = @(
            "$env:BUILD_DIR\\vcpkg-manifest-install.log",
            "$env:BUILD_DIR\\vcpkg_installed\\vcpkg\\issue_body.md",
            "$env:BUILD_DIR\\CMakeFiles\\CMakeConfigureLog.yaml",
            "$env:BUILD_DIR\\CMakeFiles\\CMakeError.log",
            "$env:BUILD_DIR\\CMakeCache.txt"
          )
          foreach ($path in $paths) {
            if (Test-Path -LiteralPath $path) {
              Write-Host "::group::$path"
              Get-Content -LiteralPath $path -Tail 400
              Write-Host "::endgroup::"
            }
          }

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: LichtFeld-v0.5.3-build-diagnostics-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 3
          path: |
            ${{ env.BUILD_DIR }}/CMakeCache.txt
            ${{ env.BUILD_DIR }}/CMakeFiles/CMakeConfigureLog.yaml
            ${{ env.BUILD_DIR }}/CMakeFiles/CMakeError.log
            ${{ env.BUILD_DIR }}/vcpkg-manifest-install.log
            ${{ env.BUILD_DIR }}/vcpkg_installed/vcpkg/issue_body.md
            ${{ env.BUILD_DIR }}/vcpkg_installed/vcpkg/blds/**/*.log

      - name: Package and verify portable build
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --install $env:BUILD_DIR --prefix dist
          $exe = "dist\\bin\\LichtFeld-Studio.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Portable executable was not installed at $exe."
          }
          $runtimeDlls = Get-ChildItem -LiteralPath "dist\\bin" -Filter "*.dll" -File
          if ($runtimeDlls.Count -eq 0) {
            throw "Portable package contains no runtime DLLs."
          }
          $shortSha = (git rev-parse --short HEAD).Trim()
          $name = "LichtFeld-Studio-v0.5.3-windows-cuda12.8-portable-$shortSha.zip"
          Compress-Archive -Path "dist\\*" -DestinationPath $name -CompressionLevel Optimal
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $name).Hash.ToLowerInvariant()
          "$hash  $name" | Set-Content "$name.sha256" -Encoding ascii
          "package_name=$name" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Package: $name"
          Write-Host "Size: $((Get-Item -LiteralPath $name).Length) bytes"
          Write-Host "SHA256: $hash"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: LichtFeld-Studio-v0.5.3-windows-portable
          path: |
            ${{ steps.package.outputs.package_name }}
            ${{ steps.package.outputs.package_name }}.sha256
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
